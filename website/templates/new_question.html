{% extends "base.html" %}

{% block title %}New Question - Quantum 4 You{% endblock %}

{% block content %}
<h2>Ask a New Question</h2>
{% if message %}
<div class="alert alert-success">{{ message }}</div>
{% endif %}
<p>
    Consider logging in to track your conversations and ask followup questions.
</p>
<form method="post">
    <div class="mb-3">
        <label for="question" class="form-label">Your Question</label>
        <textarea class="form-control" id="question" name="question" rows="4" required></textarea>
    </div>
    <div class="mb-3">
        <label for="name" class="form-label">Name (optional)</label>
        <input type="text" class="form-control" id="name" name="name">
    </div>
    <div class="mb-3">
        <label for="email" class="form-label">Email (optional)</label>
        <input type="email" class="form-control" id="email" name="email">
    </div>
    <div class="mb-3">
        <label for="tags" class="form-label">Tags (optional, comma-separated)</label>
        <input type="text" class="form-control" id="tags" name="tags" placeholder="e.g., applications, cost">
    </div>
    <button type="submit" class="btn btn-primary">Submit Question</button>
</form>
{% endblock %}
