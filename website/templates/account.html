{% extends "base.html" %}

{% block title %}Admin Login - Quantum 4 You{% endblock %}

{% block content %}
<h2>Admin Login</h2>
{% if error %}
<p style="color: red;">{{ error }}</p>
{% endif %}
<form method="post">
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required>
    <button type="submit">Login</button>
</form>
{% endblock %}
